<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض (Nabdh) | إدارة المواعيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="medicare-theme">

    <aside class="sidebar">
        <div class="brand-section">
            <div class="brand-logo-box"></div>
            <div>
                <span class="brand-name">نبض (Nabdh)</span>
                <span class="brand-sub">لإدارة الرعاية الصحية</span>
            </div>
        </div>

        <nav class="side-menu">
            <p class="menu-label">القائمة الرئيسية</p>

            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-th-large"></i> لوحة التحكم
            </a>
            <a href="patients.html" class="menu-item">
                <i class="fas fa-hospital-user"></i> إدارة المرضى
            </a>
            <a href="appointments.html" class="menu-item active">
                <i class="fas fa-calendar-alt"></i> المواعيد
            </a>
            <a href="doctors.html" class="menu-item ">
                <i class="fas fa-user-md"></i> إدارة الأطباء
            </a>

            <div style="flex-grow:1;"></div>

            <a href="#" class="menu-item" style="border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; margin-top:10px;">
                <i class="fas fa-cog"></i> الإعدادات
            </a>
        </nav>

        <button id="darkToggle" class="dark-toggle-btn">
            <i class="fas fa-moon" id="darkIcon"></i>
            <span id="darkLabel">الوضع الليلي</span>
        </button>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-details">
                    <p>د . حمـــزة</p>
                    <span>مدير النظام</span>
                </div>
            </div>
        </div>
    </aside>
    <main class="main-content">
        <header class="main-header">
            <input type="text" id="searchInput" placeholder="بحث سريع عن مريض أو طبيب..." class="top-search" oninput="filterAppointments()">
            <h2>إدارة المواعيد</h2>
        </header>

        <section class="chart-card" style="margin-bottom:20px;">
            <h3 style="margin-top:0; font-size:18px; margin-bottom:15px;">تسجيل موعد جديد</h3>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <input type="text" id="newPatient" placeholder="اسم المريض" class="top-search" style="flex:1;">
                <select name="doctors" id="newDoctor" style="border-radius:20px; padding:10px; border:1px solid #ddd; background:white; cursor:pointer;"></select>
                <input type="time" id="time"  class="top-search" style="flex:1;">
                <input type="date" id="date"  class="top-search" style="flex:1;">
                <select id="fieldspecialty" style="border-radius:20px; padding:10px; border:1px solid #ddd; background:white; cursor:pointer;">
                    <option value="">-- اختر المجال --</option>
                    <option value="باطنة">باطنة</option>
                    <option value="أطفال">أطفال</option>
                    <option value="جراحة عامة">جراحة عامة</option>
                    <option value="طوارئ">طوارئ</option>
                    
                </select>
                <select id="newStatus" style="border-radius:20px; padding:10px; border:1px solid #ddd; background:white; cursor:pointer;">
                    <option value="نشط">نشط</option>
                    <option value="قيد الانتظار">قيد الانتظار</option>
                    <option value="ملغي">ملغي</option>
                    <option value="مكتمل">مكتمل</option>
                </select>
                <button onclick="addAppointment()" style="background:var(--side-bg, #0A1D56); color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-weight:bold;">
                    إضافة للجدول
                </button>
            </div>
        </section>

        <section class="chart-card">
            <table>
                <thead>
                    <tr>
                        <th>كود</th>
                        <th>المريض</th>
                        <th>الطبيب</th>
                        
                        <th>الساعة</th>
                        <th>اليوم</th>
                        <th>المجال</th>
                        <th>الحالة</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="appointmentsTable"></tbody>
            </table>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
